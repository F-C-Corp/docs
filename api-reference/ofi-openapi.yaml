openapi: 3.1.0
info:
  title: OpenFiskal API
  version: 1.0.0
  description: |
    OpenFiskal exposes a compact fiscalization API for merchant onboarding,
    register setup, operation handling, and exports.

    Authentication uses a tenant-scoped, country-scoped API key created in the
    tenant dashboard and sent in the standard `Authorization: Bearer` header.

    Organization-scoped endpoints also require `X-OpenFiskal-Organization`.

servers:
  - url: https://api.openfiskal.com/v1
    description: Production
  - url: https://sandbox.api.openfiskal.com/v1
    description: Sandbox

tags:
  - name: Organizations
    description: Create, update, and delete merchant organizations.
  - name: Locations
    description: Create, list, read, update, and delete organization locations.
  - name: Registers
    description: Create, list, read, update, and delete organization registers.
  - name: Operations
    description: Start, update, complete, list, and read operations.
  - name: Exports
    description: Enqueue, inspect, and download export jobs.

paths:
  /organizations:
    post:
      tags: [Organizations]
      summary: Create organization
      description: Create a merchant organization.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
            example:
              legal_name: Mustermann GmbH
              country_code: DEU
              tax_id: DE123456789
              address:
                line1: Friedrichstraße 42
                city: Berlin
                postal_code: '10117'
                country_code: DEU
      responses:
        '201':
          description: Organization created
          headers:
            Location:
              schema:
                type: string
              description: URL of the created organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              example:
                id: org_01HXYZ
                legal_name: Mustermann GmbH
                country_code: DEU
                tax_id: DE123456789
                address:
                  line1: Friedrichstraße 42
                  city: Berlin
                  postal_code: '10117'
                  country_code: DEU
                created_at: '2026-02-26T10:01:00Z'
                updated_at: '2026-02-26T10:01:00Z'

  /organizations/{organizationId}:
    patch:
      tags: [Organizations]
      summary: Update organization
      description: Update a merchant organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
            example:
              legal_name: Mustermann Retail GmbH
              tax_id: DE123456789
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              example:
                id: org_01HXYZ
                legal_name: Mustermann Retail GmbH
                country_code: DEU
                tax_id: DE123456789
                created_at: '2026-02-26T10:01:00Z'
                updated_at: '2026-02-26T10:15:00Z'
    delete:
      tags: [Organizations]
      summary: Delete organization
      description: Delete a merchant organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '204':
          description: Organization deleted

  /locations:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    post:
      tags: [Locations]
      summary: Create location
      description: Create a location inside the scoped organization.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreateRequest'
            example:
              name: Berlin Mitte
              address:
                line1: Friedrichstraße 42
                city: Berlin
                postal_code: '10117'
                country_code: DEU
              timezone: Europe/Berlin
      responses:
        '201':
          description: Location created
          headers:
            Location:
              schema:
                type: string
              description: URL of the created location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
              example:
                id: loc_01HXYZ
                organization_id: org_01HXYZ
                name: Berlin Mitte
                address:
                  line1: Friedrichstraße 42
                  city: Berlin
                  postal_code: '10117'
                  country_code: DEU
                timezone: Europe/Berlin
                created_at: '2026-02-26T10:02:00Z'
                updated_at: '2026-02-26T10:02:00Z'
    get:
      tags: [Locations]
      summary: List locations
      description: List locations for the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Locations returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
              example:
                data:
                  - id: loc_01HXYZ
                    organization_id: org_01HXYZ
                    name: Berlin Mitte
                    timezone: Europe/Berlin
                    created_at: '2026-02-26T10:02:00Z'
                    updated_at: '2026-02-26T10:02:00Z'
                next_cursor: null

  /locations/{locationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Locations]
      summary: Get location
      description: Read a single location in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '200':
          description: Location returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
              example:
                id: loc_01HXYZ
                organization_id: org_01HXYZ
                name: Berlin Mitte
                address:
                  line1: Friedrichstraße 42
                  city: Berlin
                  postal_code: '10117'
                  country_code: DEU
                timezone: Europe/Berlin
                created_at: '2026-02-26T10:02:00Z'
                updated_at: '2026-02-26T10:02:00Z'
    patch:
      tags: [Locations]
      summary: Update location
      description: Update a location in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdateRequest'
            example:
              name: Berlin Mitte Flagship
              timezone: Europe/Berlin
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
              example:
                id: loc_01HXYZ
                organization_id: org_01HXYZ
                name: Berlin Mitte Flagship
                timezone: Europe/Berlin
                created_at: '2026-02-26T10:02:00Z'
                updated_at: '2026-02-26T10:20:00Z'
    delete:
      tags: [Locations]
      summary: Delete location
      description: Delete a location in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '204':
          description: Location deleted

  /registers:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    post:
      tags: [Registers]
      summary: Create register
      description: Create a register inside the scoped organization.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCreateRequest'
            example:
              location_id: loc_01HXYZ
              country_code: DEU
              name: Register 1
              external_id: pos-register-1
      responses:
        '201':
          description: Register created
          headers:
            Location:
              schema:
                type: string
              description: URL of the created register.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
              example:
                id: reg_01HXYZ
                organization_id: org_01HXYZ
                location_id: loc_01HXYZ
                country_code: DEU
                name: Register 1
                external_id: pos-register-1
                status: active
                created_at: '2026-02-26T10:03:00Z'
                updated_at: '2026-02-26T10:03:00Z'
    get:
      tags: [Registers]
      summary: List registers
      description: List registers for the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LocationFilter'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Registers returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterListResponse'
              example:
                data:
                  - id: reg_01HXYZ
                    organization_id: org_01HXYZ
                    location_id: loc_01HXYZ
                    country_code: DEU
                    name: Register 1
                    external_id: pos-register-1
                    status: active
                    created_at: '2026-02-26T10:03:00Z'
                    updated_at: '2026-02-26T10:03:00Z'
                next_cursor: null

  /registers/{registerId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Registers]
      summary: Get register
      description: Read a single register in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RegisterId'
      responses:
        '200':
          description: Register returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
              example:
                id: reg_01HXYZ
                organization_id: org_01HXYZ
                location_id: loc_01HXYZ
                country_code: DEU
                name: Register 1
                external_id: pos-register-1
                status: active
                created_at: '2026-02-26T10:03:00Z'
                updated_at: '2026-02-26T10:03:00Z'
    patch:
      tags: [Registers]
      summary: Update register
      description: Update a register in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RegisterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUpdateRequest'
            example:
              name: Register 1 Front
              status: active
      responses:
        '200':
          description: Register updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
              example:
                id: reg_01HXYZ
                organization_id: org_01HXYZ
                location_id: loc_01HXYZ
                country_code: DEU
                name: Register 1 Front
                external_id: pos-register-1
                status: active
                created_at: '2026-02-26T10:03:00Z'
                updated_at: '2026-02-26T10:25:00Z'
    delete:
      tags: [Registers]
      summary: Delete register
      description: Delete a register in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RegisterId'
      responses:
        '204':
          description: Register deleted

  /registers/{registerId}/fiscalize:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    post:
      tags: [Registers]
      summary: Trigger register fiscalization
      description: |
        Trigger the fiscalization of a single register. This might take up 2 minutes to complete.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RegisterId'
      responses:
        '202':
          description: Fiscalization queued
          headers:
            Location:
              schema:
                type: string
              description: URL of the created fiscalization job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterFiscalizationJob'
              example:
                id: rfj_01HXYZ
                register_id: reg_01HXYZ
                status: queued
                created_at: '2026-02-26T10:04:00Z'

  /operations:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    post:
      tags: [Operations]
      summary: Start operation
      description: |
        Start a new operation and return its `operation_id`.

        Supported sources:
        - `POS`
        - `ONLINE`
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationStartRequest'
            examples:
              sale:
                summary: SaleOperation
                value:
                  location_id: loc_01HXYZ
                  register_id: reg_01HXYZ
                  source: POS
                  data:
                    type: sale
                    external_reference: order-1001
                    currency: EUR
                    amount: 4250
                    line_items:
                      - name: Lunch menu
                        quantity: 1
                        unit_price: 4250
                        total_amount: 4250
              refund:
                summary: RefundOperation
                value:
                  location_id: loc_01HXYZ
                  register_id: reg_01HXYZ
                  source: POS
                  data:
                    type: refund
                    reference_operation_id: op_01PREVIOUS
                    external_reference: refund-1001
                    currency: EUR
                    amount: -4250
              exchange:
                summary: ExchangeOperation
                value:
                  location_id: loc_01HXYZ
                  register_id: reg_01HXYZ
                  source: POS
                  data:
                    type: exchange
                    reference_operation_id: op_01PREVIOUS
                    external_reference: exchange-1001
                    currency: EUR
                    amount: 500
                    returned_line_items:
                      - name: T-Shirt M
                        quantity: 1
                        unit_price: 2500
                        total_amount: 2500
                    new_line_items:
                      - name: T-Shirt L
                        quantity: 1
                        unit_price: 3000
                        total_amount: 3000
              custom:
                summary: CustomOperation
                value:
                  location_id: loc_01HXYZ
                  register_id: reg_01HXYZ
                  source: ONLINE
                  data:
                    type: custom
                    name: loyalty_adjustment
                    external_reference: loyalty-1001
                    currency: EUR
                    amount: 0
      responses:
        '201':
          description: Operation started
          headers:
            Location:
              schema:
                type: string
              description: URL of the created operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStartResponse'
              example:
                operation_id: op_01HXYZ
                op_revision: 1
                status: open
    get:
      tags: [Operations]
      summary: List operations
      description: List operations for the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RegisterFilter'
        - $ref: '#/components/parameters/LocationFilter'
        - $ref: '#/components/parameters/OperationStatusFilter'
        - $ref: '#/components/parameters/OperationTypeFilter'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Operations returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationListResponse'
              example:
                data:
                  - id: op_01HXYZ
                    op_revision: 2
                    organization_id: org_01HXYZ
                    location_id: loc_01HXYZ
                    register_id: reg_01HXYZ
                    source: POS
                    status: open
                    data:
                      type: sale
                      external_reference: order-1001
                      currency: EUR
                      amount: 4750
                    created_at: '2026-02-26T12:00:00Z'
                    updated_at: '2026-02-26T12:03:00Z'
                    completed_at: null
                next_cursor: null

  /operations/{operationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Operations]
      summary: Get operation
      description: Read a single operation in the scoped organization.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: Operation returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
              example:
                id: op_01HXYZ
                op_revision: 3
                organization_id: org_01HXYZ
                location_id: loc_01HXYZ
                register_id: reg_01HXYZ
                source: POS
                status: completed
                data:
                  type: sale
                  external_reference: order-1001
                  currency: EUR
                  amount: 4750
                fiscal_information:
                  regime: KassenSichV
                  document_number: '2026-004822'
                  document_type: Kassenbeleg
                  tse_serial: TSE0123456789ABCDEF
                  client_id: Kasse1
                  signature_algorithm: ecdsa-plain-SHA384
                  time_format: utcTime
                  start_event:
                    signed_at: '2026-02-25T19:02:11Z'
                    transaction_counter: 4821
                    signature: base64encodedStartSignature==
                  end_event:
                    signed_at: '2026-02-25T20:14:55Z'
                    transaction_counter: 4822
                    signature: base64encodedEndSignature==
                    process_type: Kassenbeleg-V1
                    process_data: 'Beleg^42.50_0.00_0.00_0.00_0.00^42.50:Bar'
                  verification:
                    qr_data: 'V0;Kasse1;ecdsa-plain-SHA384;2026-02-25T19:02:11;2026-02-25T20:14:55;42.50;4822;base64encodedEndSignature=='
                created_at: '2026-02-26T12:00:00Z'
                updated_at: '2026-02-26T12:05:01Z'
                completed_at: '2026-02-26T12:05:01Z'
    patch:
      tags: [Operations]
      summary: Update operation
      description: Update an operation while it is still open.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationUpdateRequest'
            example:
              op_revision: 1
              data:
                type: sale
                external_reference: order-1001
                currency: EUR
                amount: 4750
                line_items:
                  - name: Lunch menu
                    quantity: 1
                    unit_price: 4750
                    total_amount: 4750
      responses:
        '200':
          description: Operation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
              example:
                id: op_01HXYZ
                op_revision: 2
                organization_id: org_01HXYZ
                location_id: loc_01HXYZ
                register_id: reg_01HXYZ
                source: POS
                status: open
                data:
                  type: sale
                  external_reference: order-1001
                  currency: EUR
                  amount: 4750
                  line_items:
                    - name: Lunch menu
                      quantity: 1
                      unit_price: 4750
                      total_amount: 4750
                created_at: '2026-02-26T12:00:00Z'
                updated_at: '2026-02-26T12:03:00Z'
                completed_at: null

  /operations/{operationId}/complete:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    patch:
      tags: [Operations]
      summary: Complete operation
      description: |
        Finalizes the sale. This is a **fiscal event** — the platform signs the operation,
        generates the fiscal document, and (where required) transmits to the
        tax authority.

      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteOperationRequest'
            example:
              op_revision: 2
              transactions:
                - transaction_id: txn_1001_1
                  payment_type: card
                  kind: sale
                  amount: 4750
                  currency: EUR
                  status: success
                  gateway: shopify_payments
                  card_brand: visa
                  external_reference: ch_123
                  processed_at: '2026-02-26T12:05:00Z'
      responses:
        '200':
          description: Operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteOperationResponse'
              example:
                operation_id: op_01HXYZ
                op_revision: 3
                status: completed
                fiscal_information:
                  regime: KassenSichV
                  document_number: '2026-004822'
                  document_type: Kassenbeleg
                  tse_serial: TSE0123456789ABCDEF
                  client_id: Kasse1
                  signature_algorithm: ecdsa-plain-SHA384
                  time_format: utcTime
                  start_event:
                    signed_at: '2026-02-25T19:02:11Z'
                    transaction_counter: 4821
                    signature: base64encodedStartSignature==
                  end_event:
                    signed_at: '2026-02-25T20:14:55Z'
                    transaction_counter: 4822
                    signature: base64encodedEndSignature==
                    process_type: Kassenbeleg-V1
                    process_data: 'Beleg^42.50_0.00_0.00_0.00_0.00^42.50:Bar'
                  verification:
                    qr_data: 'V0;Kasse1;ecdsa-plain-SHA384;2026-02-25T19:02:11;2026-02-25T20:14:55;42.50;4822;base64encodedEndSignature=='

  /exports:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    post:
      tags: [Exports]
      summary: Create export job
      description: Enqueue an export job for the scoped organization.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
            example:
              type: operations
              format: csv
              from: '2026-02-01T00:00:00Z'
              to: '2026-02-29T23:59:59Z'
      responses:
        '202':
          description: Export queued
          headers:
            Location:
              schema:
                type: string
              description: URL of the created export job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                id: exp_01HXYZ
                status: queued
                format: csv
                type: operations
                created_at: '2026-02-26T12:10:00Z'
                completed_at: null
                download_url: null

  /exports/{exportId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Exports]
      summary: Get export job
      description: Read export job status before downloading.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Export job returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                id: exp_01HXYZ
                status: completed
                format: csv
                type: operations
                created_at: '2026-02-26T12:10:00Z'
                completed_at: '2026-02-26T12:12:00Z'
                download_url: https://sandbox.api.openfiskal.com/v1/exports/exp_01HXYZ/download

  /exports/{exportId}/download:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Exports]
      summary: Download export artifact
      description: Download a completed export artifact.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Export downloaded
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '409':
          description: Export is not ready for download yet.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Tenant-scoped, country-scoped API key created in the tenant dashboard.

  parameters:
    OrganizationHeader:
      name: X-OpenFiskal-Organization
      in: header
      required: true
      description: OpenFiskal organization ID for organization-scoped requests.
      schema:
        type: string
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        type: string
    RegisterId:
      name: registerId
      in: path
      required: true
      schema:
        type: string
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
    ExportId:
      name: exportId
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    LocationFilter:
      name: location_id
      in: query
      required: false
      schema:
        type: string
    RegisterFilter:
      name: register_id
      in: query
      required: false
      schema:
        type: string
    OperationStatusFilter:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [open, completed]
    OperationTypeFilter:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum: [sale, refund, exchange, custom]

  schemas:
    Address:
      type: object
      additionalProperties: false
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code.
          pattern: '^[A-Z]{3}$'
          example: DEU
      required: [line1, city, postal_code, country_code]

    Organization:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        legal_name:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code.
          pattern: '^[A-Z]{3}$'
          example: DEU
        tax_id:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, legal_name, country_code, created_at, updated_at]

    OrganizationCreateRequest:
      type: object
      additionalProperties: false
      properties:
        legal_name:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code.
          pattern: '^[A-Z]{3}$'
          example: DEU
        tax_id:
          type: string
        address:
          $ref: '#/components/schemas/Address'
      required: [legal_name, country_code]

    OrganizationUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        legal_name:
          type: string
        tax_id:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    Location:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        organization_id:
          type: string
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        timezone:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, organization_id, name, created_at, updated_at]

    LocationCreateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        timezone:
          type: string
      required: [name]

    LocationUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        timezone:
          type: string

    LocationListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Location'
        next_cursor:
          type: string
          nullable: true
      required: [data]

    Register:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        organization_id:
          type: string
        location_id:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code for this register.
          pattern: '^[A-Z]{3}$'
          example: DEU
        name:
          type: string
        external_id:
          type: string
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, organization_id, location_id, country_code, name, status, created_at, updated_at]

    RegisterCreateRequest:
      type: object
      additionalProperties: false
      properties:
        location_id:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code for this register.
          pattern: '^[A-Z]{3}$'
          example: DEU
        name:
          type: string
        external_id:
          type: string
      required: [location_id, country_code, name]

    RegisterUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code for this register.
          pattern: '^[A-Z]{3}$'
          example: DEU
        name:
          type: string
        external_id:
          type: string
        status:
          type: string
          enum: [active, inactive]

    RegisterListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Register'
        next_cursor:
          type: string
          nullable: true
      required: [data]

    RegisterFiscalizationJob:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        register_id:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]
        created_at:
          type: string
          format: date-time
      required: [id, register_id, status, created_at]

    OperationData:
      oneOf:
        - $ref: '#/components/schemas/SaleOperation'
        - $ref: '#/components/schemas/RefundOperation'
        - $ref: '#/components/schemas/ExchangeOperation'
        - $ref: '#/components/schemas/CustomOperation'
      discriminator:
        propertyName: type
        mapping:
          sale: '#/components/schemas/SaleOperation'
          refund: '#/components/schemas/RefundOperation'
          exchange: '#/components/schemas/ExchangeOperation'
          custom: '#/components/schemas/CustomOperation'

    OperationBase:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
        external_reference:
          type: string
        currency:
          type: string
        amount:
          type: integer
          description: Integer minor units. For example, cents.
        metadata:
          type: object
          additionalProperties: true
      required: [type]

    SaleOperation:
      title: SaleOperation
      allOf:
        - $ref: '#/components/schemas/OperationBase'
        - type: object
          additionalProperties: false
          properties:
            type:
              type: string
              const: sale
            line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
          required: [type]

    RefundOperation:
      title: RefundOperation
      allOf:
        - $ref: '#/components/schemas/OperationBase'
        - type: object
          additionalProperties: false
          properties:
            type:
              type: string
              const: refund
            reference_operation_id:
              type: string
            line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
          required: [type]

    ExchangeOperation:
      title: ExchangeOperation
      allOf:
        - $ref: '#/components/schemas/OperationBase'
        - type: object
          additionalProperties: false
          properties:
            type:
              type: string
              const: exchange
            reference_operation_id:
              type: string
            returned_line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
            new_line_items:
              type: array
              items:
                $ref: '#/components/schemas/LineItem'
          required: [type]

    CustomOperation:
      title: CustomOperation
      allOf:
        - $ref: '#/components/schemas/OperationBase'
        - type: object
          additionalProperties: false
          properties:
            type:
              type: string
              const: custom
            name:
              type: string
          required: [type, name]

    LineItem:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        quantity:
          type: number
        unit_price:
          type: integer
        total_amount:
          type: integer
      required: [name]

    Operation:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        op_revision:
          type: integer
          minimum: 1
          description: |
            Monotonically increasing operation revision used for optimistic concurrency
            control. Starts at `1` when the operation is created and increments after
            each successful update or completion.
        organization_id:
          type: string
        location_id:
          type: string
        register_id:
          type: string
        source:
          type: string
          enum: [POS, ONLINE]
        status:
          type: string
          enum: [open, completed]
        data:
          $ref: '#/components/schemas/OperationData'
        fiscal_information:
          $ref: '#/components/schemas/FiscalInformation'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
      required:
        [id, op_revision, organization_id, location_id, register_id, source, status, data, created_at, updated_at]

    OperationStartRequest:
      type: object
      additionalProperties: false
      properties:
        location_id:
          type: string
        register_id:
          type: string
        source:
          type: string
          enum: [POS, ONLINE]
        data:
          $ref: '#/components/schemas/OperationData'
      required: [location_id, register_id, source, data]

    OperationStartResponse:
      type: object
      additionalProperties: false
      properties:
        operation_id:
          type: string
        op_revision:
          type: integer
          minimum: 1
          description: Initial operation revision. Always `1` on create.
        status:
          type: string
          enum: [open]
      required: [operation_id, op_revision, status]

    OperationUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        op_revision:
          type: integer
          minimum: 1
          description: Last operation revision seen by the client.
        data:
          $ref: '#/components/schemas/OperationData'
      required: [op_revision, data]

    CompleteOperationRequest:
      type: object
      additionalProperties: false
      properties:
        op_revision:
          type: integer
          minimum: 1
          description: Last operation revision seen by the client.
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
      required: [op_revision, transactions]

    CompleteOperationResponse:
      type: object
      additionalProperties: false
      properties:
        operation_id:
          type: string
        op_revision:
          type: integer
          minimum: 1
          description: New operation revision after completion.
        status:
          type: string
          enum: [completed]
        fiscal_information:
          $ref: '#/components/schemas/FiscalInformation'
      required: [operation_id, op_revision, status, fiscal_information]

    Transaction:
      type: object
      additionalProperties: false
      description: |
        Payment transaction data inspired by captured and reconciled payment records.
      properties:
        transaction_id:
          type: string
        payment_type:
          type: string
          description: For example `cash`, `card`, `voucher`, or `gift_card`.
        kind:
          type: string
          description: For example `sale`, `refund`, `capture`, `change`, or `void`.
        amount:
          type: integer
          description: Integer minor units. For example, cents.
        currency:
          type: string
        status:
          type: string
          description: Processor or POS status, such as `pending`, `success`, or `failed`.
        gateway:
          type: string
          description: Payment gateway or cash indicator.
        card_brand:
          type: string
        external_reference:
          type: string
        processed_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [payment_type, kind, amount, currency, status]

    FiscalInformation:
      oneOf:
        - $ref: '#/components/schemas/FiscalInformationDEU'
        - $ref: '#/components/schemas/FiscalInformationAUT'
        - $ref: '#/components/schemas/FiscalInformationITA'
      discriminator:
        propertyName: regime
        mapping:
          KassenSichV: '#/components/schemas/FiscalInformationDEU'
          RKSV: '#/components/schemas/FiscalInformationAUT'
          RT: '#/components/schemas/FiscalInformationITA'

    FiscalInformationBase:
      type: object
      additionalProperties: false
      properties:
        regime:
          type: string
          description: Country-specific fiscal regime identifier.
        fiscalization_id:
          type: string
        document_number:
          type: string
        receipt_url:
          type: string
          format: uri
        fiscalized_at:
          type: string
          format: date-time
      required: [regime, document_number]

    FiscalInformationDEU:
      title: FiscalInformationDEU
      allOf:
        - type: object
          additionalProperties: false
          properties:
            regime:
              type: string
              const: KassenSichV
              example: KassenSichV
            document_number:
              type: string
              example: '2026-004822'
            document_type:
              type: string
              example: Kassenbeleg
            tse_serial:
              type: string
              example: TSE0123456789ABCDEF
            client_id:
              type: string
              example: Kasse1
            signature_algorithm:
              type: string
              example: ecdsa-plain-SHA384
            time_format:
              type: string
              example: utcTime
            start_event:
              $ref: '#/components/schemas/FiscalInformationDEUStartEvent'
            end_event:
              $ref: '#/components/schemas/FiscalInformationDEUEndEvent'
            verification:
              $ref: '#/components/schemas/FiscalInformationDEUVerification'
          required:
            [regime, document_number, document_type, tse_serial, client_id, signature_algorithm, time_format, start_event, end_event, verification]

    FiscalInformationDEUStartEvent:
      type: object
      additionalProperties: false
      properties:
        signed_at:
          type: string
          format: date-time
          example: '2026-02-25T19:02:11Z'
        transaction_counter:
          type: integer
          example: 4821
        signature:
          type: string
          example: base64encodedStartSignature==
      required: [signed_at, transaction_counter, signature]

    FiscalInformationDEUEndEvent:
      type: object
      additionalProperties: false
      properties:
        signed_at:
          type: string
          format: date-time
          example: '2026-02-25T20:14:55Z'
        transaction_counter:
          type: integer
          example: 4822
        signature:
          type: string
          example: base64encodedEndSignature==
        process_type:
          type: string
          example: Kassenbeleg-V1
        process_data:
          type: string
          example: Beleg^42.50_0.00_0.00_0.00_0.00^42.50:Bar
      required: [signed_at, transaction_counter, signature, process_type, process_data]

    FiscalInformationDEUVerification:
      type: object
      additionalProperties: false
      properties:
        qr_data:
          type: string
          example: V0;Kasse1;ecdsa-plain-SHA384;2026-02-25T19:02:11;2026-02-25T20:14:55;42.50;4822;base64encodedEndSignature==
      required: [qr_data]

    FiscalInformationAUT:
      title: FiscalInformationAUT
      allOf:
        - type: object
          additionalProperties: false
          properties:
            regime:
              type: string
              const: RKSV
            document_number:
              type: string
            receipt_url:
              type: string
              format: uri
            fiscalized_at:
              type: string
              format: date-time
            qr_code_data:
              type: string
            receipt_machine_id:
              type: string
            signature_value:
              type: string
            certificate_serial_number:
              type: string
          required: [regime, document_number, qr_code_data]

    FiscalInformationITA:
      title: FiscalInformationITA
      allOf:
        - type: object
          additionalProperties: false
          properties:
            regime:
              type: string
              const: RT
            document_number:
              type: string
            receipt_url:
              type: string
              format: uri
            fiscalized_at:
              type: string
              format: date-time
            lottery_code:
              type: string
            device_id:
              type: string
            transmission_id:
              type: string
            government_response:
              type: string
          required: [regime, document_number]

    OperationListResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Operation'
        next_cursor:
          type: string
          nullable: true
      required: [data]

    ExportRequest:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          description: Export type to generate.
        format:
          type: string
          enum: [csv, json, zip]
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
      required: [type, format, from, to]

    ExportJob:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]
        format:
          type: string
          enum: [csv, json, zip]
        type:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        download_url:
          type: string
          format: uri
          nullable: true
      required: [id, status, format, type, created_at]
