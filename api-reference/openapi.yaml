    PaymentDto:
      type: object
      properties:
        payment_id:
          type: string
          example: pay_1001_card
          description: Integrator payment ID
        method:
          type: string
          enum:
            - cash
            - card
            - voucher
            - gift_card
            - bank_transfer
            - digital_wallet
            - store_credit
            - other
          example: card
        amount:
          type: string
          example: "47.50"
          description: Payment amount as decimal string
        currency:
          type: string
          example: EUR
          description: ISO 4217 3-char currency code
        status:
          type: string
          enum:
            - pending
            - authorized
            - captured
            - failed
            - voided
            - refunded
          example: captured
        processor:
          type: string
          example: sumup
          description: Payment processor name
        card_brand:
          type: string
          example: visa
          description: Card brand if method is card
        processor_reference:
          type: string
          example: ch_123
          description: Processor reference ID
        processed_at:
          type: string
          example: 2026-02-26T12:05:00Z
          description: When the payment was processed (ISO 8601)
      required:
        - payment_id
        - method
        - amount
        - currency
        - status
    CompleteOperationDto:
      type: object
      properties:
        payments:
          description: Payments tendered for this operation
          type: array
          items:
            $ref: "#/components/schemas/PaymentDto"
        completed_at:
          type: string
          example: 2026-02-26T12:05:00Z
          description: Completion timestamp (ISO 8601), defaults to now
      required:
        - payments
    VoidOperationDto:
      type: object
      properties:
        reason:
          type: string
          enum:
            - void_before_completion
            - customer_abandoned_checkout
            - operator_cancelled
            - payment_failed
          example: customer_abandoned_checkout
          description: Reason for voiding the operation
      required:
        - reason
    ExportType:
      type: string
      enum:
        - dsfinvk
      description: Country-specific fiscal export type.
    CreateExportDto:
      type: object
      properties:
        type:
          example: dsfinvk
          description: Country-specific fiscal export type.
          allOf:
            - $ref: "#/components/schemas/ExportType"
        register_id:
          type: string
          example: reg_01HABC
          description: Optional register to scope the export to. When omitted, the export covers all eligible registers for the merchant under the matching fiscal regime.
        from:
          type: string
          format: date-time
          example: 2026-03-01T00:00:00Z
        to:
          type: string
          format: date-time
          example: 2026-03-31T23:59:59Z
      required:
        - type
        - from
        - to
    ExportError:
      type: object
      properties:
        message:
          type: string
          description: Human-readable failure description.
        details:
          type: object
          nullable: true
          description: Structured error payload (e.g. provider error response). Shape varies by export type.
      required:
        - message
    Export:
      type: object
      properties:
        id:
          type: string
        type:
          allOf:
            - $ref: "#/components/schemas/ExportType"
        status:
          type: string
          enum:
            - pending
            - completed
            - failed
        register_id:
          type: string
          nullable: true
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        download_url:
          type: string
          nullable: true
          description: Signed URL to download the export artifact. Present only when status is `completed`.
        error:
          nullable: true
          description: Failure information. Present only when status is `failed`.
          allOf:
            - $ref: "#/components/schemas/ExportError"
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - type
        - status
        - from
        - to
        - created_at
