info:
  title: OpenFiskal fiscalization API
  description: |-
    OpenFiskal exposes a server-to-server fiscalization API for merchant onboarding,
    register setup, operation handling, and exports.

    The `v1` contract uses server-issued resource versions and conditional
    writes through `If-Match` for safe concurrent mutation handling.
  version: 1.1.0
  contact: {}
  license:
    name: Proprietary
tags:
  - name: Merchants
    description: Create and manage merchant merchants.
  - name: Locations
    description: Create and manage merchant locations.
  - name: Registers
    description: Create and manage registers or terminals.
  - name: Operations
    description: Start, update, complete, cancel, list, and read operations.
servers:
  - url: https://api.openfiskal.com/v1
    description: Production
  - url: https://sandbox.api.openfiskal.com/v1
    description: Sandbox
components:
  securitySchemes:
    BearerAuth:
      scheme: bearer
      bearerFormat: API key
      type: http
  schemas:
    FiscalIdentityDeuDto:
      type: object
      properties:
        country_code:
          type: string
          enum:
            - DEU
          example: DEU
        tax_number:
          type: string
          example: 21/815/08150
          description: Steuernummer
        vat_id:
          type: string
          example: DE123456789
          description: USt-IdNr
      required:
        - country_code
        - tax_number
        - vat_id
    FiscalIdentityAutDto:
      type: object
      properties:
        country_code:
          type: string
          enum:
            - AUT
          example: AUT
        vat_id:
          type: string
          example: ATU12345678
        tax_number:
          type: string
        legal_entity_id_type:
          type: string
          enum:
            - VAT_ID
            - TAX_ID
            - GLN
          example: VAT_ID
        gln:
          type: string
          description: 13-digit Global Location Number, required when legal_entity_id_type is GLN
      required:
        - country_code
        - legal_entity_id_type
    FiscalIdentityItaDto:
      type: object
      properties:
        country_code:
          type: string
          enum:
            - ITA
          example: ITA
        tax_number:
          type: string
          example: "12345678901"
          description: "Tax number (Codice Fiscale). 11 numeric digits or 16 alphanumeric characters. Example: 12345678901 or RSSMRA85T10A562S. For companies, this may be identical to the VAT number."
        vat_number:
          type: string
          example: IT12345678901
          description: VAT number (Partita IVA)
        legal_entity_type:
          type: string
          enum:
            - COMPANY
            - INDIVIDUAL
          example: COMPANY
          description: Select whether your organization is a company (Societa) or an individual (Persona fisica).
        fisconline_password:
          type: string
          description: Fisconline Password
        fisconline_pin:
          type: string
          description: Fisconline PIN
        fisconline_user:
          type: string
          description: Fisconline User - The Codice Fiscale of the person authorized to access the Agenzia delle Entrate portal on behalf of the business.
      required:
        - country_code
        - tax_number
        - vat_number
        - legal_entity_type
        - fisconline_password
        - fisconline_pin
