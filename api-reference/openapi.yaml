        tax_amount:
          type: string
          example: "1.58"
          description: Computed tax amount for this line item
      required:
        - name
        - rate
        - tax_amount
    LineItemDto:
      type: object
      properties:
        title:
          type: string
          example: Café Latte
        quantity:
          type: number
          example: 2
        unit_price:
          type: string
          example: "4.50"
          description: Price per unit
        total_amount:
          type: string
          example: "9.00"
          description: Total amount for this line item (quantity * unit_price)
        taxes:
          description: One entry per VAT rate applied to this line. At least one entry required.
          type: array
          items:
            $ref: "#/components/schemas/LineItemTaxDto"
      required:
        - title
        - quantity
        - unit_price
        - total_amount
        - taxes
    CreateOperationDto:
      type: object
      properties:
        register_id:
          type: string
          example: reg_abc123
          description: Required for POS, must be null for ONLINE.
        source:
          type: string
          enum:
            - POS
            - ONLINE
          example: POS
        type:
          type: string
          enum:
            - sale
            - refund
            - exchange
          example: sale
        currency:
          type: string
          example: USD
          description: ISO 4217 currency code
        external_id:
          type: string
          example: order-12345
          description: Merchant or POS identifier for the upstream order.
        related_operation_id:
          type: string
          example: op_abc123
          description: "For refunds/exchanges: the original operation ID"
        note:
          type: string
          example: Customer requested extra napkins
        pretax_amount:
          type: string
          example: "9.00"
          description: Total before taxes
        tax_amount:
          type: string
          example: "0.95"
          description: Total tax amount
        tip_amount:
          type: string
          example: "0.00"
          description: Tip amount
        total_amount:
          type: string
          example: "9.95"
          description: Total amount (pretax + tax + tip)
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/LineItemDto"
      required:
        - source
        - type
        - currency
        - pretax_amount
        - tax_amount
        - tip_amount
        - total_amount
        - line_items
    PaymentDto:
      type: object
      properties:
        payment_id:
          type: string
          example: pay_1001_card
          description: Integrator payment ID
        method:
          type: string
          enum:
            - cash
            - card
            - voucher
            - gift_card
            - bank_transfer
            - digital_wallet
            - store_credit
            - other
          example: card
        amount:
          type: string
          example: "47.50"
          description: Payment amount as decimal string
        currency:
          type: string
          example: EUR
          description: ISO 4217 3-char currency code
        status:
          type: string
          enum:
            - pending
            - authorized
            - captured
            - failed
            - voided
            - refunded
          example: captured
        processor:
          type: string
          example: sumup
          description: Payment processor name
        card_brand:
          type: string
          example: visa
          description: Card brand if method is card
        processor_reference:
          type: string
          example: ch_123
          description: Processor reference ID
        processed_at:
          type: string
          example: 2026-02-26T12:05:00Z
          description: When the payment was processed (ISO 8601)
      required:
        - payment_id
        - method
        - amount
        - currency
        - status
    CompleteOperationDto:
      type: object
      properties:
        payments:
          description: Payments tendered for this operation
          type: array
          items:
            $ref: "#/components/schemas/PaymentDto"
        completed_at:
          type: string
          example: 2026-02-26T12:05:00Z
          description: Completion timestamp (ISO 8601), defaults to now
      required:
        - payments
    VoidOperationDto:
      type: object
      properties:
        reason:
          type: string
          enum:
            - void_before_completion
            - customer_abandoned_checkout
            - operator_cancelled
            - payment_failed
          example: customer_abandoned_checkout
          description: Reason for voiding the operation
      required:
        - reason
