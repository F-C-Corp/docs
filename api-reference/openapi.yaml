info:
  title: OpenFiskal fiscalization API
  description: |-
    OpenFiskal exposes a server-to-server fiscalization API for merchant onboarding,
    register setup, operation handling, and exports.

    The `v1` contract uses server-issued resource versions and conditional
    writes through `If-Match` for safe concurrent mutation handling.
  version: 1.1.0
  contact: {}
  license:
    name: Proprietary
tags:
  - name: Merchants
    description: Create and manage merchant merchants.
  - name: Locations
    description: Create and manage merchant locations.
  - name: Registers
    description: Create and manage registers or terminals.
  - name: Operations
    description: Start, update, complete, cancel, list, and read operations.
servers:
  - url: https://api.openfiskal.com/v1
    description: Production
  - url: https://sandbox.api.openfiskal.com/v1
    description: Sandbox
components:
  securitySchemes:
    BearerAuth:
      scheme: bearer
      bearerFormat: API key
      type: http
  schemas:
    FiscalIdentityDeuDto:
      type: object
      properties:
        country:
          type: string
          enum:
            - DEU
          example: DEU
        tax_number:
          type: string
          example: 21/815/08150
          description: Steuernummer
        vat_id:
          type: string
          example: DE123456789
          description: USt-IdNr
      required:
        - country
    FiscalIdentityAutDto:
      type: object
      properties:
        country:
          type: string
          enum:
            - AUT
          example: AUT
        vat_id:
          type: string
          example: ATU12345678
        tax_number:
          type: string
        legal_entity_id_type:
          type: string
          enum:
            - VAT_ID
            - TAX_ID
            - GLN
          example: VAT_ID
        gln:
          type: string
          description: 13-digit Global Location Number, required when legal_entity_id_type is GLN
      required:
        - country
        - legal_entity_id_type
    FiscalIdentityItaDto:
      type: object
      properties:
        country:
          type: string
          enum:
            - ITA
          example: ITA
        vat_id:
          type: string
          example: IT01234567890
          description: Partita IVA
        codice_fiscale:
          type: string
          example: RSSMRA85M01H501Z
          description: Codice Fiscale
        legal_entity_type:
          type: string
          enum:
            - COMPANY
            - INDIVIDUAL
          example: COMPANY
      required:
        - country
        - legal_entity_type
    AddressResponse:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code.
          minLength: 3
          maxLength: 3
          example: DEU
      required:
        - line1
        - city
        - postal_code
        - country_code
    Merchant:
      type: object
      properties:
        id:
          type: string
        legal_name:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-3 country code for the legal entity.
          minLength: 3
          maxLength: 3
          example: DEU
        tax_id:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        address:
          $ref: "#/components/schemas/AddressResponse"
        fiscal_identities:
          type: array
          description: Country-specific fiscal identities.
          items:
            oneOf:
              - $ref: "#/components/schemas/FiscalIdentityDeuDto"
              - $ref: "#/components/schemas/FiscalIdentityAutDto"
              - $ref: "#/components/schemas/FiscalIdentityItaDto"
            discriminator:
              propertyName: country
              mapping:
                DEU: "#/components/schemas/FiscalIdentityDeuDto"
                AUT: "#/components/schemas/FiscalIdentityAutDto"
                ITA: "#/components/schemas/FiscalIdentityItaDto"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - legal_name
        - country_code
        - tax_id
        - status
        - address
        - fiscal_identities
        - created_at
        - updated_at
    MerchantListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Merchant"
        next_cursor:
          type: string
          nullable: true
      required:
        - data
    ErrorDto:
      type: object
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          example: invalid_request
        message:
          type: string
          description: Human-readable explanation of the error.
        retryable:
          type: boolean
          description: Whether retrying the request is safe.
        request_id:
          type: string
          description: Stable request trace identifier.
        details:
          type: object
          description: Additional structured context for the error.
          additionalProperties: true
      required:
        - code
        - message
        - retryable
    AddressDto:
      type: object
      properties:
        line1:
          type: string
          example: Musterstr. 1
        line2:
          type: string
          example: Apt 4
          nullable: true
        city:
          type: string
          example: Berlin
        postal_code:
          type: string
          example: "10115"
        country_code:
          type: string
          example: DEU
          minLength: 3
          maxLength: 3
          description: ISO 3166-1 alpha-3 (uppercase)
      required:
        - line1
        - city
        - postal_code
        - country_code
    CreateMerchantDto:
      type: object
      properties:
        legal_name:
          type: string
          example: Test GmbH
        country_code:
          type: string
          example: DEU
          minLength: 3
          maxLength: 3
          description: ISO 3166-1 alpha-3 country code for the legal entity (uppercase)
        tax_id:
          type: string
          example: DE123456789
        address:
          $ref: "#/components/schemas/AddressDto"
        fiscal_identities:
          type: array
          description: Country-specific fiscal identities
          items:
            oneOf:
              - $ref: "#/components/schemas/FiscalIdentityDeuDto"
              - $ref: "#/components/schemas/FiscalIdentityAutDto"
              - $ref: "#/components/schemas/FiscalIdentityItaDto"
            discriminator:
              propertyName: country
              mapping:
                DEU: "#/components/schemas/FiscalIdentityDeuDto"
                AUT: "#/components/schemas/FiscalIdentityAutDto"
                ITA: "#/components/schemas/FiscalIdentityItaDto"
      required:
        - legal_name
        - country_code
        - tax_id
        - address
    UpdateMerchantDto:
      type: object
      properties:
        legal_name:
          type: string
          example: Updated GmbH
        tax_id:
          type: string
          example: DE987654321
        status:
          type: string
          enum:
            - active
            - inactive
          example: inactive
        address:
          $ref: "#/components/schemas/AddressDto"
        fiscal_identities:
          type: array
          description: Country-specific fiscal identities (merge by country key)
          items:
            oneOf:
              - $ref: "#/components/schemas/FiscalIdentityDeuDto"
              - $ref: "#/components/schemas/FiscalIdentityAutDto"
              - $ref: "#/components/schemas/FiscalIdentityItaDto"
            discriminator:
              propertyName: country
              mapping:
                DEU: "#/components/schemas/FiscalIdentityDeuDto"
                AUT: "#/components/schemas/FiscalIdentityAutDto"
                ITA: "#/components/schemas/FiscalIdentityItaDto"
    RegisterFiscalization:
      type: object
      properties:
        regime:
          type: string
        fiscalized_at:
          type: string
          format: date-time
          nullable: true
        tse_serial:
          type: string
          nullable: true
        client_id:
          type: string
          nullable: true
      required:
        - regime
    Register:
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        location_id:
          type: string
        name:
          type: string
        external_id:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - active
            - inactive
        fiscalization_status:
          type: string
          enum:
            - not_fiscalized
            - pending
            - failed
            - fiscalized
            - decommissioned
        fiscalization:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/RegisterFiscalization"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - merchant_id
        - location_id
        - name
        - status
        - fiscalization_status
        - created_at
    RegisterListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Register"
        next_cursor:
          type: string
          nullable: true
      required:
        - data
    CreateRegisterDto:
      type: object
      properties:
        location_id:
          type: string
          example: loc_abc123
          description: ID of the location this register belongs to
        name:
          type: string
          example: Register 1
        external_id:
          type: string
          example: POS-001
          description: Your own identifier for this register
      required:
        - location_id
        - name
    UpdateRegisterDto:
      type: object
      properties:
        name:
          type: string
          example: Register 1
        external_id:
          type: string
          example: POS-001
          description: Your own identifier for this register
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
    Location:
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        name:
          type: string
        external_id:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        address:
          $ref: "#/components/schemas/AddressResponse"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - merchant_id
        - name
        - address
        - created_at
    LocationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        next_cursor:
          type: string
          nullable: true
      required:
        - data
    CreateLocationDto:
      type: object
      properties:
        name:
          type: string
          example: Main Store
        external_id:
          type: string
          example: loc-001
        address:
          $ref: "#/components/schemas/AddressDto"
        timezone:
          type: string
          example: Europe/Berlin
      required:
        - name
        - address
        - timezone
    UpdateLocationDto:
      type: object
      properties:
        name:
          type: string
          example: Updated Store Name
        external_id:
          type: string
          example: loc-002
        address:
          $ref: "#/components/schemas/AddressDto"
        timezone:
          type: string
          example: Europe/Vienna
    FiscalInformationKassenSichVStartEvent:
      type: object
      properties:
        signed_at:
          type: string
          format: date-time
      required:
        - signed_at
    FiscalInformationKassenSichVEndEvent:
      type: object
      properties:
        signed_at:
          type: string
          format: date-time
        transaction_counter:
          type: number
        signature:
          type: string
        public_key:
          type: string
        process_type:
          type: string
        process_data:
          type: string
      required:
        - signed_at
        - transaction_counter
        - signature
        - public_key
        - process_type
        - process_data
    FiscalInformationKassenSichVVerification:
      type: object
      properties:
        qr_data:
          type: string
      required:
        - qr_data
    FiscalInformationKassenSichV:
      type: object
      properties:
        regime:
          type: string
          enum:
            - KassenSichV
        document_number:
          type: string
        document_type:
          type: string
        tss_serial_number:
          type: string
        pos_client_serial_number:
          type: string
        signature_algorithm:
          type: string
        time_format:
          type: string
        start_event:
