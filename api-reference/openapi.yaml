openapi: 3.1.0
info:
  title: OpenFiskal fiscalization API
  version: 1.1.0
  license:
    name: Proprietary
  description: |
    OpenFiskal exposes a server-to-server fiscalization API for merchant onboarding,
    register setup, operation handling, exports, and bulk jobs.

    The `v1` contract uses server-issued resource versions and conditional
    writes through `If-Match` for safe concurrent mutation handling.
servers:
  - url: https://api.openfiskal.com/v1
    description: Production
  - url: https://sandbox.api.openfiskal.com/v1
    description: Sandbox
tags:
  - name: Platform
    description: Platform health, limits, and capabilities.
  - name: Organizations
    description: Create and manage merchant organizations.
  - name: Locations
    description: Create and manage merchant locations.
  - name: Registers
    description: Create and manage registers or terminals.
  - name: Operations
    description: Start, update, complete, cancel, list, and read operations.
  - name: Exports
    description: Create and inspect asynchronous export jobs.
  - name: Bulk jobs
    description: Bulk onboarding and import jobs.
paths:
  /health:
    get:
      tags: [Platform]
      summary: Get platform health
      description: Returns liveness, dependency status, and a request trace ID.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Platform health returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /platform/limits:
    get:
      tags: [Platform]
      summary: Get current limits
      description: Returns published rate, timeout, and idempotency guidance for the current tenant and organization scope.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationHeaderOptional'
      responses:
        '200':
          description: Platform limits returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Limits'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations:
    get:
      tags: [Organizations]
      summary: List organizations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Organizations returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Organizations]
      summary: Create organization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        '201':
          description: Organization created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /organizations/{organizationId}:
    get:
      tags: [Organizations]
      summary: Get organization
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Organization returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Organizations]
      summary: Update organization
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
      responses:
        '200':
          description: Organization updated
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /locations:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Locations]
      summary: List locations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Locations returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Locations]
      summary: Create location
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreateRequest'
      responses:
        '201':
          description: Location created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /registers:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Registers]
      summary: List registers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Registers returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Registers]
      summary: Create register
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCreateRequest'
      responses:
        '201':
          description: Register created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /operations:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Operations]
      summary: List operations
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OperationStatus'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/OperationType'
        - name: order_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Operations returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Operations]
      summary: Create operation
      description: Starts a new operation. Persist the returned `ETag` for later mutation requests.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationCreateRequest'
      responses:
        '201':
          description: Operation created
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'

  /operations/{operationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Operations]
      summary: Get operation
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: Operation returned
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Operations]
      summary: Update operation
      description: Updates a mutable operation by using a server-issued `ETag` in `If-Match`.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationPatchRequest'
      responses:
        '200':
          description: Operation updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'

  /operations/{operationId}/complete:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    patch:
      tags: [Operations]
      summary: Complete operation
      description: Finalizes an operation and attaches the typed payment contract used for fiscalization and reconciliation.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationCompleteRequest'
      responses:
        '200':
          description: Operation completed
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'

  /operations/{operationId}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    patch:
      tags: [Operations]
      summary: Cancel operation
      description: Cancels an operation before completion. Use a refund operation after completion.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OperationId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperationCancelRequest'
      responses:
        '200':
          description: Operation cancelled
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'

  /exports:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Exports]
      summary: List export jobs
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Export jobs returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExportJob'
                  next_cursor:
                    type: string
                    nullable: true
    post:
      tags: [Exports]
      summary: Create export job
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportCreateRequest'
      responses:
        '202':
          description: Export job created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'

  /exports/{exportId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Exports]
      summary: Get export job
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Export job returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /bulk-jobs:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Bulk jobs]
      summary: List bulk jobs
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Bulk jobs returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BulkJob'
                  next_cursor:
                    type: string
                    nullable: true
    post:
      tags: [Bulk jobs]
      summary: Create bulk job
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkJobCreateRequest'
      responses:
        '202':
          description: Bulk job created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'

  /bulk-jobs/{jobId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationHeader'
    get:
      tags: [Bulk jobs]
      summary: Get bulk job
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BulkJobId'
      responses:
        '200':
          description: Bulk job returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  headers:
    ETag:
      description: Server-issued operation resource version used with `If-Match`.
      schema:
        type: string
        example: '"opv_01JXYZ"'
    XRequestId:
      description: Stable request trace identifier.
      schema:
        type: string
        example: req_01JABCXYZ
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    OrganizationHeader:
      name: X-OpenFiskal-Organization
      in: header
      required: true
      schema:
        type: string
      description: Organization identifier returned by the organizations resource.
    OrganizationHeaderOptional:
      name: X-OpenFiskal-Organization
      in: header
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: Unique key per endpoint, organization, and tenant. Retained for at least 24 hours.
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: Latest operation `ETag` returned by OpenFiskal.
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
    ExportId:
      name: exportId
      in: path
      required: true
      schema:
        type: string
    BulkJobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: invalid_request
            message: The request body is malformed.
            retryable: false
    Unauthorized:
      description: Authentication failed
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: unauthorized
            message: Authentication failed.
            retryable: false
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: not_found
            message: The requested resource does not exist.
            retryable: false
    UnprocessableEntity:
      description: Domain validation failed
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: regime_validation_failed
            message: The payload violates regime-specific validation rules.
            retryable: false
    RateLimited:
      description: Rate limit exceeded
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: rate_limit_exceeded
            message: Too many requests.
            retryable: true
    IdempotencyConflict:
      description: Idempotency key reused with a different payload
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: idempotency_key_conflict
            message: The idempotency key was already used with a different payload.
            retryable: false
    PreconditionRequired:
      description: Missing `If-Match` header
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: precondition_required
            message: This operation requires an If-Match header.
            retryable: false
    PreconditionFailed:
      description: Stale `If-Match` header
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: precondition_failed
            message: The supplied If-Match value is stale.
            retryable: true
            details:
              current_resource_version: opv_01JXYZNEW
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message, retryable]
    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        postal_code:
          type: string
        country_code:
          type: string
      required: [line1, city, postal_code, country_code]
    Organization:
      type: object
      properties:
        id:
          type: string
        legal_name:
          type: string
        country_code:
          type: string
        tax_id:
          type: string
        status:
          type: string
          enum: [active, inactive]
        address:
          $ref: '#/components/schemas/Address'
        capabilities:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, legal_name, country_code, tax_id, status, address, created_at, updated_at]
    OrganizationCreateRequest:
      type: object
      properties:
        legal_name:
          type: string
        country_code:
          type: string
        tax_id:
          type: string
        address:
          $ref: '#/components/schemas/Address'
      required: [legal_name, country_code, tax_id, address]
    OrganizationUpdateRequest:
      type: object
      properties:
        legal_name:
          type: string
        tax_id:
          type: string
        status:
          type: string
          enum: [active, inactive]
        address:
          $ref: '#/components/schemas/Address'
    OrganizationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
