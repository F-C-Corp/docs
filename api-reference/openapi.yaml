      type: string
      enum: [open, pending_payment, payment_pending, completed, cancelled]
    FiscalTransmissionStatus:
      type: string
      enum: [not_required, pending, submitted, accepted, failed]
    PaymentMethod:
      type: string
      enum: [cash, card, voucher, gift_card, bank_transfer, digital_wallet, store_credit, other]
    PaymentKind:
      type: string
      enum: [sale, tip, refund, cashback, fee_adjustment]
    PaymentStatus:
      type: string
      enum: [pending, authorized, partially_approved, captured, failed, voided, refunded]
    LineItemInput:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
