        quantity:
          type: number
        unit_price:
          type: integer
        total_amount:
          type: integer
        tax_code:
          type: string
          nullable: true
      required: [name, quantity, unit_price, total_amount]
    LineItem:
      allOf:
        - $ref: '#/components/schemas/LineItemInput'
        - type: object
          properties:
            id:
              type: string
    Totals:
      type: object
      properties:
        subtotal_amount:
          type: integer
        tip_amount:
          type: integer
        tax_amount:
          type: integer
        total_amount:
          type: integer
      required: [total_amount]
    PaymentInput:
      type: object
      properties:
        payment_id:
          type: string
        method:
          $ref: '#/components/schemas/PaymentMethod'
        kind:
          $ref: '#/components/schemas/PaymentKind'
        status:
          $ref: '#/components/schemas/PaymentStatus'
        amount:
          type: integer
        currency:
          type: string
        requested_amount:
          type: integer
          nullable: true
